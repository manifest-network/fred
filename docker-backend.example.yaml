# Docker Backend Configuration Example
#
# Copy this file to docker-backend.yaml and customize for your environment.
#
# IMPORTANT: You must configure sku_mapping to link on-chain SKU UUIDs to
# local resource profiles. Without this mapping, provisioning will fail with
# "unknown SKU" errors.

# Backend name (used in Fred configuration)
name: docker

# HTTP server listen address
listen_addr: ":9001"

# Docker daemon socket or URL
docker_host: "unix:///var/run/docker.sock"

# Resource pool - total available capacity
total_cpu_cores: 8.0
total_memory_mb: 16384
total_disk_mb: 102400

# SKU Mapping (REQUIRED)
#
# Maps on-chain SKU UUIDs to local profile names. When a tenant creates a lease,
# the chain assigns a SKU UUID. This mapping tells the backend which resource
# profile to provision.
#
# To get your SKU UUIDs:
#   manifestd query sku skus-by-provider <your-provider-uuid>
#
# Example output:
#   - uuid: "019c1ee7-1aaf-7000-802c-ad775c72cc27"
#     name: "compute-small"
#     ...
#
# Then map each UUID to a profile below:
sku_mapping:
  "019c1ee7-1aaf-7000-802c-ad775c72cc27": "docker-micro"
  "019c1ee7-816c-7001-8c26-a61d57e7403e": "docker-small"
  "019c1ee8-3ef5-7002-beb3-07a3d4b8ce95": "docker-medium"
  "019c1ee8-9d9c-7003-8d01-4188dfe9e204": "docker-large"
  # Add your SKU UUIDs here...

# SKU profiles define resource limits for each tier
# Profile names are referenced by sku_mapping above
sku_profiles:
  docker-micro:
    cpu_cores: 0.25
    memory_mb: 256
    disk_mb: 512
  docker-small:
    cpu_cores: 0.5
    memory_mb: 512
    disk_mb: 1024
  docker-medium:
    cpu_cores: 1.0
    memory_mb: 1024
    disk_mb: 2048
  docker-large:
    cpu_cores: 2.0
    memory_mb: 2048
    disk_mb: 4096

# Security: Only images from these registries can be pulled
allowed_registries:
  - "docker.io"
  - "ghcr.io"
  # Add more registries as needed:
  # - "gcr.io"
  # - "registry.example.com"

# HMAC secret for signing callbacks to Fred (minimum 32 characters)
# Generate with: openssl rand -hex 32
callback_secret: "change-me-to-a-secure-32-char-secret!"

# Skip TLS certificate verification for callbacks (development only!)
# WARNING: Never enable in production - vulnerable to MITM attacks
callback_insecure_skip_verify: true

# External host address for port mappings
# This is the address tenants will use to connect to containers
host_address: "0.0.0.0"

# Container Hardening
#
# These settings control multi-tenant security hardening for containers.
# All defaults are secure-by-default.

# IP address to bind container ports to. Use "127.0.0.1" to restrict
# to localhost only. Default: "0.0.0.0" (all interfaces).
# host_bind_ip: "0.0.0.0"

# Enable per-tenant Docker network isolation. Each tenant's containers
# are placed in a separate internal bridge network with no external
# connectivity between tenants. Default: true.
# network_isolation: true

# Set the container's root filesystem to read-only. When enabled,
# /tmp and /run are mounted as tmpfs. Default: true.
# container_readonly_rootfs: true

# Maximum number of PIDs allowed in each container. Prevents fork bombs.
# Default: 256.
# container_pids_limit: 256

# Size in MB for tmpfs mounts (/tmp, /run) when readonly rootfs is
# enabled. Default: 64.
# container_tmpfs_size_mb: 64

# Timeouts
provision_timeout: 10m
container_create_timeout: 30s
image_pull_timeout: 5m
container_start_timeout: 30s

# How often to reconcile state with Docker
reconcile_interval: 5m
