name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build -v ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test
        # Note: -race flag omitted due to memory constraints on GitHub runners.
        # Run `go test -race ./...` locally before pushing critical changes.
        run: go test -v ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.8.0

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        # Advisory: docker/docker (GO-2026-4887, GO-2026-4883) has no patched
        # release and moby/buildkit + docker/cli fixes are blocked by
        # docker/compose v2 compatibility.  Treat exit-code 3 (vulns found)
        # as a warning until upstream ships fixes; other failures still break CI.
        run: |
          set +e
          govulncheck ./...
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if [ "$status" -eq 3 ]; then
            echo "::warning::govulncheck found known vulnerabilities; see report above."
            exit 0
          fi

          exit "$status"
