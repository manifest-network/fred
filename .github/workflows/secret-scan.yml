name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # gitleaks CLI (not gitleaks-action, which requires a paid license for
      # GitHub org accounts). Scans the working tree against the default ruleset
      # plus .gitleaks.toml's allowlist. Complements GitHub's native secret
      # scanning + push protection. Exits non-zero if a secret is detected.
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks dir . --config .gitleaks.toml --redact --exit-code 1
