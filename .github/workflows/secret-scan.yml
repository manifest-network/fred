name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # gitleaks CLI (not gitleaks-action, which requires a paid license for
      # GitHub org accounts). The release tarball is pinned by version AND
      # verified against its published SHA-256 before execution, so a tampered
      # or swapped artifact fails the step rather than running in CI. Scans the
      # working tree against the default ruleset plus .gitleaks.toml's allowlist;
      # complements GitHub's native secret scanning + push protection.
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}" -o "$tarball"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          ./gitleaks dir . --config .gitleaks.toml --redact --exit-code 1
