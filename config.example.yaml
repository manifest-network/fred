# Manifest Provider Daemon Configuration
#
# This file contains all configuration options for providerd.
# You can also set these via environment variables with PROVIDER_ prefix.
# Example: PROVIDER_CHAIN_ID=manifest-1

# Chain configuration
chain_id: "manifest-1"
grpc_endpoint: "localhost:9090"
websocket_url: "ws://localhost:26657/websocket"

# gRPC TLS configuration (optional)
# Enable TLS for chain gRPC connection
grpc_tls_enabled: false
# Path to CA certificate file (optional, uses system CAs if empty)
grpc_tls_ca_file: ""
# Skip certificate verification (for testing only, not recommended for production)
grpc_tls_skip_verify: false

# Provider identification
# Your provider UUID (must be registered on-chain)
provider_uuid: "01234567-89ab-cdef-0123-456789abcdef"
# Your provider's management address
provider_address: "manifest1..."

# Keyring configuration
# Backend options: file, os, test
keyring_backend: "file"
# Directory containing the keyring
keyring_dir: "/home/provider/.manifest"
# Name of the key to use for signing
key_name: "provider"

# API server configuration
# Address to listen on for tenant connections
api_listen_addr: ":8080"

# TLS configuration (optional, enables HTTPS)
# Leave empty for HTTP
tls_cert_file: ""
tls_key_file: ""
# Example with self-signed cert:
# tls_cert_file: "/path/to/cert.pem"
# tls_key_file: "/path/to/key.pem"

# Withdrawal configuration
# How often to withdraw accumulated fees
# Supports Go duration format: 1h, 30m, 24h, etc.
withdraw_interval: "1h"

# Bech32 prefix for address validation
# This should match the chain's address prefix (e.g., "manifest", "cosmos", "osmo")
bech32_prefix: "manifest"

# Rate limiting configuration
# Requests per second allowed per IP address
rate_limit_rps: 10
# Maximum burst size (requests allowed in a burst before rate limiting kicks in)
rate_limit_burst: 20

# Backend configuration (required)
# At least one backend must be configured. Backends handle the actual
# provisioning of resources when leases are created.
#
# NOTE: SKU-based routing (sku_prefix) is not yet implemented. Currently all
# leases are routed to the default backend. Multi-backend routing is planned
# for a future release.
backends:
  # Mock backend for testing (run with: make run-mock)
  - name: mock
    url: "http://localhost:9000"
    timeout: 30s
    default: true  # This backend is used for SKUs that don't match any prefix

  # Example: Kubernetes backend for k8s-* SKUs
  # - name: kubernetes
  #   url: "http://k8s-backend:9000"
  #   timeout: 30s
  #   sku_prefix: "k8s-"

  # Example: GPU backend for gpu-* SKUs
  # - name: gpu
  #   url: "http://gpu-backend:9000"
  #   timeout: 60s
  #   sku_prefix: "gpu-"

  # Example: VM backend for vm-* SKUs
  # - name: vm
  #   url: "http://vm-backend:9000"
  #   timeout: 30s
  #   sku_prefix: "vm-"

# Callback URL (required when backends are configured)
# This is the URL backends will call to report provisioning status.
# Must be reachable from your backends.
callback_base_url: "http://localhost:8080"

# Callback secret (required)
# HMAC-SHA256 secret for authenticating callbacks from backends.
# Must be at least 32 characters. Generate with: openssl rand -hex 32
callback_secret: "your-secret-key-at-least-32-characters-long"

# Advanced timeout configuration (optional)
# HTTP server timeouts
http_read_timeout: "15s"
http_write_timeout: "15s"
http_idle_timeout: "60s"

# WebSocket configuration
websocket_ping_interval: "30s"
websocket_reconnect_initial: "1s"
websocket_reconnect_max: "60s"

# Transaction configuration
tx_poll_interval: "500ms"
tx_timeout: "30s"
gas_limit: 500000
gas_price: 25
fee_denom: "umfx"

# Query and pagination limits
query_page_limit: 100
max_withdraw_iterations: 100

# API limits
max_request_body_size: 1048576  # 1MB

# Credit check configuration
credit_check_error_threshold: 3
credit_check_retry_interval: "30s"
