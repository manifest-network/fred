version: 2

builds:
  - id: providerd
    main: ./cmd/providerd
    binary: providerd
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: docker-backend
    main: ./cmd/docker-backend
    binary: docker-backend
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X main.version={{.Version}}

# NOTE: k3s-backend is intentionally NOT released as an artifact. It is an
# experimental, non-functional scaffold (ENG-133) whose provisioner returns
# "not implemented"; shipping it as a release binary/archive would imply it is
# usable. Build it from source (`go build ./cmd/k3s-backend`) until real
# provisioning lands (ENG-134+), then add it back here.
archives:
  - id: providerd
    ids: [providerd]
    name_template: "providerd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: docker-backend
    ids: [docker-backend]
    name_template: "docker-backend_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers:
  - ids: [providerd]
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/manifest-network/fred:{{ .Version }}"
      - "ghcr.io/manifest-network/fred:{{ if not .Prerelease }}latest{{ end }}"
      - "ghcr.io/manifest-network/fred:{{ if not .Prerelease }}{{ .Major }}.{{ .Minor }}{{ end }}"
      - "ghcr.io/manifest-network/fred:{{ if not .Prerelease }}{{ .Major }}{{ end }}"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=providerd"
      - "--label=org.opencontainers.image.description=Manifest Network provider daemon"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

# Software Bill of Materials (syft) per release archive.
sboms:
  - id: archives
    artifacts: archive

# Keyless cosign signature over the checksums file (Sigstore: Fulcio cert +
# Rekor transparency log, via the workflow's OIDC token — no long-lived keys).
# The checksums file covers every artifact, so verifying this one signature +
# the checksums validates all archives/SBOMs. Produces a self-contained
# .sigstore.json bundle; verify with:
#   cosign verify-blob --bundle checksums.txt.sigstore.json \
#     --certificate-identity-regexp '^https://github\.com/manifest-network/fred/\.github/workflows/release\.yml@refs/tags/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Keyless cosign signature over the published container image, by digest.
# Verify with: cosign verify ghcr.io/manifest-network/fred:<tag> \
#   --certificate-identity-regexp '^https://github\.com/manifest-network/fred/\.github/workflows/release\.yml@refs/tags/' \
#   --certificate-oidc-issuer https://token.actions.githubusercontent.com
docker_signs:
  - cmd: cosign
    artifacts: images
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"
    output: true

changelog:
  sort: asc
  groups:
    - title: New Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - Merge pull request
      - Merge branch

release:
  prerelease: auto
