version: "2"

run:
  timeout: 10m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - nilerr
    - errorlint
    - exhaustruct
    - gosec
  settings:
    errcheck:
      check-type-assertions: false  # Too noisy for type assertions
    exhaustruct:
      # Directive-only mode: exclude every type globally so the linter checks
      # ONLY literals explicitly marked //exhaustruct:enforce (the recovered-
      # Provision / ProvisionState construction sites). Keeps the guard off the
      # rest of the repo and all test literals. (ENG-193)
      exclude:
        - '.*'
    gocritic:
      enabled-tags:
        - diagnostic
    misspell:
      locale: US
    gosec:
      # G115 (integer-overflow on conversion) has a very high false-positive
      # rate; every site flagged in this repo is bounded/validated (manifest
      # port specs 1-65535, file modes masked with ModePerm, clamped page
      # limits, chain-derived SKU counts, lossless int64<->uint64 time
      # round-trips). G104 (unhandled errors) duplicates errcheck, which is
      # enabled above and already tuned for this repo. Exclude both rule-wide.
      excludes:
        - G115
        - G104
  exclusions:
    rules:
      # Exclude test files from strict linters
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - unused
          - gocritic
          - errorlint
          - misspell
          - gosec
      # Exclude cmd tools from strict linters
      - path: ^cmd/
        linters:
          - errcheck
          - gocritic
      # Exclude testutil from strict checks
      - path: ^internal/testutil/
        linters:
          - errcheck
      # lifecycle.go tar extraction: ENG-430 (#147) reworked it with os.Root,
      # which structurally eliminated the path-traversal findings (G304/G305).
      # The remaining G110 is the per-entry io.Copy, bounded by the maxBytes cap
      # (verified non-exploitable). Suppressed via config (not an inline comment)
      # so the line isn't pulled into the PR diff and re-flagged by CodeQL.
      - path: ^internal/backend/docker/lifecycle\.go$
        linters:
          - gosec
        text: "G110:"
      # Volume drivers shell out to btrfs/xfs/zfs and read per-volume metadata
      # files by design. Every exec uses a constant binary with discrete argv
      # (no shell -> no command injection), and every path is rooted at the
      # trusted provider-config dataPath; the only tenant-influenced segment
      # (service name) is regex-validated (serviceNameRe, a DNS label), so no
      # traversal or flag-injection is possible. Verified non-exploitable.
      - path: internal/backend/docker/volume_.*\.go
        linters:
          - gosec
        text: "G204|G304"
      # mock-backend is a dev/test harness (not the production daemon); its
      # opt-in InsecureSkipVerify (off by default, MOCK_BACKEND_TLS_SKIP_VERIFY-
      # gated) is intentional for local self-signed-cert testing. Suppress G402
      # via config rather than an inline nolint: that line also carries a CodeQL
      # go/disabled-certificate-check alert, and editing it would make CodeQL
      # re-attribute the pre-existing alert as "new in this PR".
      - path: ^cmd/mock-backend/
        linters:
          - gosec
        text: "G402"
      # Exclude deprecated API warnings from dependencies we can't control
      - linters:
          - staticcheck
        text: "SA1019"
      # Exclude error comparisons for sentinel errors
      - linters:
          - errorlint
        text: "comparing with"
      # Exclude staticcheck style suggestions
      - linters:
          - staticcheck
        text: "ST1023|S1000|QF1003"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/manifest-network/fred

output:
  formats:
    text:
      path: stdout
